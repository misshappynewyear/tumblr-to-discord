name: Run Tumblr to Discord

on:
  workflow_dispatch:
    inputs:
      tags:
        description: "Comma-separated Tumblr tags"
        required: false
      delay_ms:
        description: "Delay between Discord posts in milliseconds"
        required: false
  schedule:
    - cron: "0 */3 * * *"

jobs:
  run-bot:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browser
        run: npx playwright install chromium

      - name: Run bot
        env:
          TUMBLR_API_KEY: ${{ secrets.TUMBLR_API_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TAGS: ${{ github.event.inputs.tags || vars.TAGS }}
          DELAY_MS: ${{ github.event.inputs.delay_ms || vars.DELAY_MS || '2000' }}
          ENABLE_WEB_CAPTURE: "true"
        run: node index.js

      - name: Commit updated state
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git diff --cached --quiet || git commit -m "Update bot state"
          git push
